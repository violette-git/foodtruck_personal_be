{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="shortcut icon" type="image/png" href="{% static 'images/pig_logo-final.png' %}"/>
    <title>Log In — Not Quite Hawaiian Food Truck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body id="sign-body">
    {% include 'navbar.html' %}

    <div class="auth-logo">
        <a href="{% url 'user_app:base' %}">
            <img id="company-name" src="{% static 'images/company_nam.png' %}" alt="Not Quite Hawaiian Food Truck">
        </a>
    </div>

    <div class="auth-wrapper">
        <div class="form-card">
            <h2 class="text-center mb-1" style="font-family: var(--font-heading); color: var(--color-primary-dark); letter-spacing: 0.04em;">Welcome Back</h2>
            <p class="text-center mb-3" style="color: var(--color-text-muted); font-size: 0.9rem;">Sign in to your account</p>

            {% if error %}
            <div class="alert alert-danger text-center" role="alert">{{ error }}</div>
            {% endif %}

            <form action="{% url 'user_app:login' %}" method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Your username" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Your password" required>
                </div>

                <button class="btn btn-dark w-100 mb-3" type="submit">Log In</button>

                <p class="text-center mb-0" style="font-size: 0.9rem; color: var(--color-text-muted);">
                    First time here?
                    <a href="{% url 'user_app:register' %}" style="color: var(--color-primary); font-weight: 600; text-decoration: none;">Create an account</a>
                </p>
            </form>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
</body>
</html>
